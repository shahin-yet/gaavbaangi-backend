# NOTE: This workflow is ONLY for PythonAnywhere deployment of the backend.
# It uploads minimal backend files and triggers a webapp reload on PythonAnywhere.

name: Deploy Backend to PythonAnywhere

on:
  push:
    branches: [ main, master ]
    paths:
      - 'backend/**'
  workflow_dispatch: {}

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies for deploy script
        run: |
          python -m pip install --upgrade pip
          pip install requests python-dotenv

      - name: Deploy to PythonAnywhere
        env:
          PA_USERNAME: ${{ secrets.PA_USERNAME }}
          PA_API_TOKEN: ${{ secrets.PA_API_TOKEN }}
          PA_WEBAPP_DOMAIN: ${{ secrets.PA_WEBAPP_DOMAIN }}
          PA_TARGET_DIR: ${{ secrets.PA_TARGET_DIR }}
          PA_API_BASE_URL: ${{ secrets.PA_API_BASE_URL }}
        run: |
          python backend/pa_deploy.py


